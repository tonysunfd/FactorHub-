services:
  # FactorFlow service (FastAPI + frontend static files)
  factorflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: backend
    container_name: factorflow
    ports:
      - "8000:8000"
    volumes:
      # Persistent data directory
      - ../data:/app/data
      # Persistent app config (LLM config, runtime settings)
      - ../config:/app/config
      # Persistent logs
      - ../logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
