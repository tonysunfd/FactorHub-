<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kronos WebUI</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a 60%, #0ea5e9);
      color: #0f172a;
      min-height: 100vh;
    }
    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px;
    }
    .hero {
      color: #eff6ff;
      margin-bottom: 20px;
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }
    .hero p {
      margin: 0;
      opacity: 0.88;
    }
    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
    }
    .panel, .content {
      background: rgba(255,255,255,0.96);
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.18);
    }
    .panel {
      padding: 20px;
      align-self: start;
    }
    .content {
      padding: 20px;
    }
    .section-title {
      margin: 0 0 14px;
      font-size: 18px;
      color: #0f172a;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .tab-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 600;
      cursor: pointer;
      background: #dbeafe;
      color: #1d4ed8;
    }
    .tab-btn.active {
      background: #1d4ed8;
      color: #fff;
    }
    .field {
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
    }
    .field input, .field select {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .actions button {
      flex: 1;
      border: none;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
    }
    .actions button.secondary {
      background: linear-gradient(135deg, #475569, #334155);
    }
    .status {
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 16px;
      background: #e0f2fe;
      color: #0c4a6e;
      white-space: pre-wrap;
    }
    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }
    .metric-card {
      border: 1px solid #dbeafe;
      border-radius: 16px;
      padding: 16px;
      background: linear-gradient(180deg, #eff6ff, #ffffff);
    }
    .metric-card .label {
      color: #64748b;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .metric-card .value {
      color: #0f172a;
      font-size: 24px;
      font-weight: 700;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
    }
    .table th, .table td {
      border-bottom: 1px solid #e2e8f0;
      padding: 10px 12px;
      font-size: 13px;
      text-align: left;
    }
    .table th {
      background: #eff6ff;
      color: #1e3a8a;
    }
    .tag {
      display: inline-flex;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #dbeafe;
      color: #1d4ed8;
    }
    pre {
      margin: 0;
      padding: 16px;
      border-radius: 16px;
      background: #0f172a;
      color: #dbeafe;
      overflow: auto;
      font-size: 12px;
      line-height: 1.5;
    }
    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <h1>Kronos 预测</h1>
      <p>原生 WebUI 以独立服务运行，并通过 Factorhub V3 的 `Kronos 预测` tab 原样嵌入。当前为 Phase 1：CPU + 异步队列。</p>
    </div>

    <div class="layout">
      <aside class="panel">
        <div class="tabs">
          <button class="tab-btn active" data-mode="single">单票预测</button>
          <button class="tab-btn" data-mode="batch">批量预测</button>
        </div>

        <div id="statusBox" class="status">正在加载运行状态...</div>

        <div class="field">
          <label>模型</label>
          <select id="modelName">
            <option value="{{ default_model }}">{{ default_model }}</option>
          </select>
        </div>
        <div class="field">
          <label>Device</label>
          <select id="device">
            <option value="{{ default_device }}">{{ default_device }}</option>
            <option value="cuda">cuda（Phase 2）</option>
            <option value="mps">mps（兼容位）</option>
          </select>
        </div>
        <div class="field">
          <label>数据来源</label>
          <select id="sourceType">
            <option value="factorhub_stock">Factorhub 单票</option>
            <option value="factorhub_universe">Factorhub 股票池</option>
            <option value="local_file">本地文件（兼容模式）</option>
          </select>
        </div>
        <div class="field" id="stockCodeField">
          <label>股票代码</label>
          <input id="stockCode" value="000001" placeholder="例如：000001">
        </div>
        <div class="field" id="universeField" style="display:none">
          <label>股票池</label>
          <select id="universe">
            <option value="hs300">HS300</option>
            <option value="csi500">CSI500</option>
            <option value="csi1000">CSI1000</option>
            <option value="all_a">All A</option>
          </select>
        </div>
        <div class="field">
          <label>开始日期</label>
          <input id="startDate" type="date" value="2024-01-01">
        </div>
        <div class="field">
          <label>结束日期</label>
          <input id="endDate" type="date" value="2025-12-31">
        </div>
        <div class="field">
          <label>Lookback</label>
          <input id="lookback" type="number" value="400" min="60" max="512">
        </div>
        <div class="field">
          <label>Pred Len</label>
          <input id="predLen" type="number" value="120" min="5" max="240">
        </div>
        <div class="field">
          <label>Temperature</label>
          <input id="temperature" type="number" value="1" step="0.1" min="0.1" max="2">
        </div>
        <div class="field">
          <label>Top P</label>
          <input id="topP" type="number" value="0.9" step="0.05" min="0.1" max="1">
        </div>
        <div class="field">
          <label>Sample Count</label>
          <input id="sampleCount" type="number" value="1" min="1" max="16">
        </div>

        <div class="actions">
          <button id="runBtn">开始任务</button>
          <button id="previewBtn" class="secondary">预览数据</button>
        </div>
      </aside>

      <main class="content">
        <h2 class="section-title">任务结果</h2>
        <div class="card-grid">
          <div class="metric-card">
            <div class="label">当前任务</div>
            <div class="value" id="taskIdValue">-</div>
          </div>
          <div class="metric-card">
            <div class="label">状态</div>
            <div class="value" id="taskStatusValue">Idle</div>
          </div>
          <div class="metric-card">
            <div class="label">预测收益</div>
            <div class="value" id="forecastReturnValue">-</div>
          </div>
          <div class="metric-card">
            <div class="label">预测波动</div>
            <div class="value" id="forecastVolatilityValue">-</div>
          </div>
        </div>

        <div id="batchTableWrap" style="display:none; margin-bottom: 18px;">
          <h2 class="section-title">批量结果</h2>
          <table class="table">
            <thead>
              <tr>
                <th>股票代码</th>
                <th>预测开始</th>
                <th>预测结束</th>
                <th>Forecast Return</th>
                <th>Forecast Volatility</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody id="batchTableBody"></tbody>
          </table>
        </div>

        <h2 class="section-title">原始结果 JSON</h2>
        <pre id="resultJson">{}</pre>
      </main>
    </div>
  </div>

  <script>
    const statusBox = document.getElementById('statusBox');
    const runBtn = document.getElementById('runBtn');
    const previewBtn = document.getElementById('previewBtn');
    const sourceType = document.getElementById('sourceType');
    const stockCodeField = document.getElementById('stockCodeField');
    const universeField = document.getElementById('universeField');
    const tabs = Array.from(document.querySelectorAll('.tab-btn'));
    const taskIdValue = document.getElementById('taskIdValue');
    const taskStatusValue = document.getElementById('taskStatusValue');
    const forecastReturnValue = document.getElementById('forecastReturnValue');
    const forecastVolatilityValue = document.getElementById('forecastVolatilityValue');
    const resultJson = document.getElementById('resultJson');
    const batchTableWrap = document.getElementById('batchTableWrap');
    const batchTableBody = document.getElementById('batchTableBody');

    let currentMode = 'single';
    let pollTimer = null;

    function setStatus(message, isError = false) {
      statusBox.textContent = message;
      statusBox.className = isError ? 'status error' : 'status';
    }

    function getPayload() {
      return {
        source_type: currentMode === 'batch' ? 'factorhub_universe' : sourceType.value,
        stock_code: document.getElementById('stockCode').value.trim(),
        universe: document.getElementById('universe').value,
        start_date: document.getElementById('startDate').value,
        end_date: document.getElementById('endDate').value,
        model_name: document.getElementById('modelName').value,
        device: document.getElementById('device').value,
        lookback: Number(document.getElementById('lookback').value),
        pred_len: Number(document.getElementById('predLen').value),
        temperature: Number(document.getElementById('temperature').value),
        top_p: Number(document.getElementById('topP').value),
        sample_count: Number(document.getElementById('sampleCount').value),
      };
    }

    function renderResult(task) {
      const result = task.result_payload || {};
      taskIdValue.textContent = task.task_id || '-';
      taskStatusValue.textContent = task.status || '-';
      forecastReturnValue.textContent = result.forecast_return != null ? `${(result.forecast_return * 100).toFixed(2)}%` : '-';
      forecastVolatilityValue.textContent = result.forecast_volatility != null ? `${(result.forecast_volatility * 100).toFixed(2)}%` : '-';
      resultJson.textContent = JSON.stringify(task, null, 2);

      if (Array.isArray(result.items) && result.items.length) {
        batchTableWrap.style.display = currentMode === 'batch' ? 'block' : 'none';
        batchTableBody.innerHTML = result.items.map((item) => `
          <tr>
            <td>${item.stock_code || '-'}</td>
            <td>${item.prediction_start || '-'}</td>
            <td>${item.prediction_end || '-'}</td>
            <td>${item.forecast_return != null ? (item.forecast_return * 100).toFixed(2) + '%' : '-'}</td>
            <td>${item.forecast_volatility != null ? (item.forecast_volatility * 100).toFixed(2) + '%' : '-'}</td>
            <td><span class="tag">${item.status || '-'}</span></td>
          </tr>
        `).join('');
      } else {
        batchTableWrap.style.display = 'none';
      }
    }

    async function loadRuntimeStatus() {
      const { data } = await axios.get('/kronos-ui/api/runtime-status');
      setStatus(`运行状态：${data.device}，队列 ${data.queue.redis_connected ? '已连接' : '未连接'}，当前阶段 ${data.phase}`);
    }

    async function previewData() {
      try {
        setStatus('正在预览数据...');
        const { data } = await axios.post('/kronos-ui/api/load-data', getPayload());
        resultJson.textContent = JSON.stringify(data, null, 2);
        setStatus(`数据已加载：${data.data.title || data.data.preview?.stock_count || ''}`);
      } catch (error) {
        setStatus(error?.response?.data?.detail || error.message || '预览失败', true);
      }
    }

    async function pollTask(taskId) {
      if (pollTimer) window.clearInterval(pollTimer);
      pollTimer = window.setInterval(async () => {
        try {
          const { data } = await axios.get(`/kronos-ui/api/tasks/${taskId}`);
          renderResult(data.data);
          setStatus(`任务 ${taskId}：${data.data.status}`);
          if (['completed', 'failed', 'cancelled'].includes(data.data.status)) {
            window.clearInterval(pollTimer);
            pollTimer = null;
          }
        } catch (error) {
          window.clearInterval(pollTimer);
          pollTimer = null;
          setStatus(error?.response?.data?.detail || error.message || '轮询失败', true);
        }
      }, 2000);
    }

    async function runTask() {
      try {
        const payload = getPayload();
        setStatus('任务已提交，等待队列处理...');
        const url = currentMode === 'batch'
          ? '/kronos-ui/api/tasks/batch-predict'
          : '/kronos-ui/api/tasks/predict';
        const { data } = await axios.post(url, payload);
        renderResult(data.data);
        await pollTask(data.data.task_id);
      } catch (error) {
        setStatus(error?.response?.data?.detail || error.message || '任务提交失败', true);
      }
    }

    function syncModeUI() {
      const source = currentMode === 'batch' ? 'factorhub_universe' : sourceType.value;
      stockCodeField.style.display = source === 'factorhub_stock' ? 'block' : 'none';
      universeField.style.display = source === 'factorhub_universe' || currentMode === 'batch' ? 'block' : 'none';
      sourceType.value = currentMode === 'batch' ? 'factorhub_universe' : sourceType.value;
    }

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        currentMode = tab.dataset.mode;
        tabs.forEach((item) => item.classList.toggle('active', item === tab));
        syncModeUI();
        batchTableWrap.style.display = currentMode === 'batch' ? 'block' : 'none';
      });
    });

    sourceType.addEventListener('change', syncModeUI);
    previewBtn.addEventListener('click', previewData);
    runBtn.addEventListener('click', runTask);

    syncModeUI();
    loadRuntimeStatus().catch((error) => {
      setStatus(error?.response?.data?.detail || error.message || '运行状态加载失败', true);
    });
  </script>
</body>
</html>
